<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Infoboard</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        font-family: sans-serif;
    }
    .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        height: 100vh;
        width: 100vw;
    }
    .left-column {
        display: grid;
        grid-template-rows: auto 1fr 1fr;
        height: 100%;
        width: 100%;
    }
    .right-column {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
    }
    .top-banner, .calendar-banner, .slides-banner {
        color: white;
        text-align: center;
        font-size: 20px;
        padding: 10px;
        flex-shrink: 0;
        font-weight: bold;
    }
    .calendar-banner {
        background-color: #c62828; /* deep red */
    }
    .top-banner {
        background-color: #2e7d32; /* rich green */
    }
    .slides-banner {
        background-color: #1565c0; /* strong blue */
    }
    .right-content {
        flex-grow: 1;
        position: relative;
    }
    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
    .slides-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: relative;
    }
    .slides-container iframe {
        flex-grow: 1;
        transform: scale(0.95); /* shrink a bit to fit */
        transform-origin: top center;
        margin-top: 5px;
    }
</style>
</head>
<body>
    <div class="container">
        <!-- Venstre kolonne -->
        <div class="left-column">
            <div class="calendar-banner">
                Kalender over kommende aktiviteter i byen
            </div>

            <!-- Google Kalender -->
            <iframe src="https://calendar.google.com/calendar/embed?src=fd7eaf4e2aa69c3e984a83824983eb7655b38893a5d5c95d4145d28197a0402c%40group.calendar.google.com&mode=AGENDA&ctz=Europe%2FCopenhagen" title="Google Kalender - Listevisning"></iframe>

            <!-- Google Slides -->
            <div class="slides-container">
                <div class="slides-banner">
                    Støt det lokale erhvervsliv
                </div>
                <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vRb_y8noPAO8Wlsq5XEuUOSqGjxqX_qw6O3ObdTHT_IGln017TUejxIiA3RFZ2i-1liluSuvMgf-Bez/pubembed?start=true&loop=true&delayms=10000" 
                        title="Google Slides" allowfullscreen></iframe>
            </div>
        </div>

        <!-- Højre kolonne -->
        <div class="right-column">
            <div class="top-banner">
                Aktuelle aktiviteter - Læs mere på via QR koden
            </div>
            <div class="right-content">
                <iframe src="https://borgernyt.dk/infotavle-aktiviteter/" 
                        title="Borgernyt Aktiviteter" 
                        sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
            </div>
        </div>
    </div>

    <script>
        // Hard refresh every 30 minutes
        setInterval(() => { location.reload(true); }, 1800000);
    </script>
</body>
</html>
