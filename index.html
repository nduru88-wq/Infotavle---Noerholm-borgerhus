<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Infoboard</title>

<style>
html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:#050505;
}

*{
  box-sizing:border-box;
}

:root{
  --panel-radius:18px;
  --gap:2px;
  --outer-padding:2px;

  --bg-main:#050505;
  --bg-shell:#0a0a0a;
  --panel-bg:#0d0d0f;

  --panel-border:rgba(255,255,255,0.05);
  --panel-highlight:rgba(255,255,255,0.06);
  --panel-shadow:rgba(0,0,0,0.60);

  --divider-dark:#161616;
  --divider-mid:#242424;
  --divider-glow:rgba(255,255,255,0.06);
}

body{
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.04), transparent 30%),
    radial-gradient(circle at bottom right, rgba(255,255,255,0.03), transparent 30%),
    var(--bg-main);
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  width:100vw;
  height:100vh;
  gap:var(--gap);
  padding:var(--outer-padding);
  background:var(--bg-shell);
}

/* KOLONNER */
.left-column{
  display:grid;
  grid-template-rows:auto 1fr var(--gap) auto 1fr;
  gap:var(--gap);
  min-width:0;
  min-height:0;
}

.right-column{
  display:flex;
  flex-direction:column;
  gap:var(--gap);
  min-width:0;
  min-height:0;
}

/* PANEL */
.panel{
  position:relative;
  min-width:0;
  min-height:0;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)),
    var(--panel-bg);
  border-radius:var(--panel-radius);
  overflow:hidden;
  box-shadow:
    0 0 0 1px var(--panel-border),
    0 16px 38px var(--panel-shadow),
    inset 0 1px 0 var(--panel-highlight);
}

.panel::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:28%;
  background:linear-gradient(to bottom, rgba(255,255,255,0.04), transparent);
  pointer-events:none;
  z-index:1;
}

/* INDHOLDSPANELER */
.calendar-content,
.right-content{
  position:relative;
  min-height:0;
}

.right-content{
  flex:1;
}

/* BANNERS */
.top-banner,
.calendar-banner,
.slides-banner{
  position:relative;
  z-index:2;
  color:white;
  text-align:center;
  font-size:16px;
  padding:6px;
  font-weight:600;
  letter-spacing:0.2px;
  flex-shrink:0;
}

.calendar-banner{
  background:linear-gradient(#d23737,#9f1f1f);
}

.top-banner{
  background:linear-gradient(#3a9641,#25682b);
}

.slides-banner{
  background:linear-gradient(#2a78d2,#164e91);
}

/* INNER FRAME */
.frame-inner{
  position:absolute;
  inset:0;
  border-radius:calc(var(--panel-radius) - 1px);
  background:#000;
  overflow:hidden;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.04),
    inset 0 10px 25px rgba(0,0,0,0.6);
  z-index:0;
}

/* IFRAME */
iframe{
  width:100%;
  height:100%;
  border:none;
  display:block;
  background:white;
}

/* ZOOMET KALENDER */
.calendar-zoom{
  position:absolute;
  top:0;
  left:0;
  width:125%;
  height:125%;
  transform:scale(0.8);
  transform-origin:0 0;
}

/* SLIDES */
.slides-container{
  display:flex;
  flex-direction:column;
  height:100%;
  min-height:0;
}

.slideshow{
  position:relative;
  flex:1;
  background:#000;
  overflow:hidden;
  min-height:0;
}

.slideshow img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  opacity:0;
  transition:opacity 1s;
  background:#000;
}

.slideshow img.active{
  opacity:1;
}

/* DIVIDER */
.divider-horizontal{
  height:var(--gap);
  width:100%;
  border-radius:999px;
  background:linear-gradient(
    to bottom,
    rgba(255,255,255,0.12),
    var(--divider-mid),
    var(--divider-dark)
  );
  box-shadow:0 0 4px var(--divider-glow);
}
</style>
</head>

<body>

<div class="container">

  <!-- VENSTRE -->
  <div class="left-column">

    <div class="calendar-banner panel">
      Kalender over kommende aktiviteter i byen
    </div>

    <div class="calendar-content panel">
      <div class="frame-inner">
        <iframe
          id="calendarFrame"
          class="calendar-zoom"
          src="https://calendar.google.com/calendar/embed?src=fd7eaf4e2aa69c3e984a83824983eb7655b38893a5d5c95d4145d28197a0402c%40group.calendar.google.com&mode=AGENDA&ctz=Europe%2FCopenhagen&showTitle=0&showNav=0&showPrint=0&showCalendars=0">
        </iframe>
      </div>
    </div>

    <div class="divider-horizontal"></div>

    <div class="slides-container panel">
      <div class="slides-banner">
        Lokalt erhvervsliv (sponsorer)
      </div>

      <div class="slideshow">
        <img src="SH-generalinfo.jpg" class="active" alt="Sponsor 1">
        <img src="SH-Brudens%20kl%C3%A6deskab.jpg" alt="Sponsor 2">
        <img src="SH-Porsheden.jpg" alt="Sponsor 3">
      </div>
    </div>

  </div>

  <!-- HØJRE -->
  <div class="right-column">

    <div class="top-banner panel">
      Aktuelle aktiviteter - Læs mere via QR koden
    </div>

    <div class="right-content panel">
      <div class="frame-inner">
        <iframe
          id="newsFrame"
          src="https://borgernyt.dk/infotavle-blandet/"
          sandbox="allow-same-origin allow-scripts allow-popups allow-forms">
        </iframe>
      </div>
    </div>

  </div>

</div>

<script>
const slides = document.querySelectorAll(".slideshow img");
let index = 0;

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 5000);

function refreshIframe(frameId, baseUrl){
  const frame = document.getElementById(frameId);
  const sep = baseUrl.includes("?") ? "&" : "?";
  frame.src = baseUrl + sep + "_ts=" + Date.now();
}

setInterval(() => {
  refreshIframe(
    "newsFrame",
    "https://borgernyt.dk/infotavle-blandet/"
  );

  refreshIframe(
    "calendarFrame",
    "https://calendar.google.com/calendar/embed?src=fd7eaf4e2aa69c3e984a83824983eb7655b38893a5d5c95d4145d28197a0402c%40group.calendar.google.com&mode=AGENDA&ctz=Europe%2FCopenhagen&showTitle=0&showNav=0&showPrint=0&showCalendars=0"
  );
}, 1800000);

setInterval(() => {
  const cleanUrl = window.location.origin + window.location.pathname + "?v=" + Date.now();
  window.location.replace(cleanUrl);
}, 21600000);

function refreshSlides(){
  document.querySelectorAll(".slideshow img").forEach(img => {
    const original = img.getAttribute("src").split("?")[0];
    img.setAttribute("src", original + "?v=" + Date.now());
  });
}

setInterval(refreshSlides, 1800000);
</script>

</body>
</html>
