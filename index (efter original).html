<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Infoboard</title>

  <style>
    html, body{
      margin:0;
      padding:0;
      height:100%;
      width:100%;
      overflow:hidden;
      font-family:sans-serif;
      background:#000;
    }

    .container{
      display:grid;
      grid-template-columns:1fr 1fr;
      height:100vh;
      width:100vw;
    }

    .left-column{
      display:grid;
      grid-template-rows:auto 1fr 1fr;
      height:100%;
      width:100%;
      min-height:0;
    }

    .right-column{
      display:flex;
      flex-direction:column;
      width:100%;
      height:100%;
      min-height:0;
    }

    .top-banner,.calendar-banner,.slides-banner{
      color:white;
      text-align:center;
      font-size:20px;
      padding:10px;
      flex-shrink:0;
      font-weight:bold;
      box-sizing:border-box;
    }

    .calendar-banner{
      background-color:#c62828;
    }

    .top-banner{
      background-color:#2e7d32;
    }

    .slides-banner{
      background-color:#1565c0;
    }

    .right-content{
      flex-grow:1;
      position:relative;
      min-height:0;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      display:block;
      background:#fff;
    }

    .slides-container{
      display:flex;
      flex-direction:column;
      width:100%;
      height:100%;
      overflow:hidden;
      position:relative;
      background:black;
      min-height:0;
    }

    .slideshow{
      flex-grow:1;
      position:relative;
      background:black;
      overflow:hidden;
    }

    .slideshow img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      opacity:0;
      transition:opacity 1s ease-in-out;
      background:black;
    }

    .slideshow img.active{
      opacity:1;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- VENSTRE -->
  <div class="left-column">

    <div class="calendar-banner">
      Kalender over kommende aktiviteter i byen
    </div>

    <!-- Google kalender -->
    <iframe
      id="calendarFrame"
      src="https://calendar.google.com/calendar/embed?src=fd7eaf4e2aa69c3e984a83824983eb7655b38893a5d5c95d4145d28197a0402c%40group.calendar.google.com&mode=AGENDA&ctz=Europe%2FCopenhagen">
    </iframe>

    <!-- Slideshow -->
    <div class="slides-container">

      <div class="slides-banner">
        Lokalt erhvervsliv (sponsorer)
      </div>

      <div class="slideshow">
        <img src="SH-generalinfo.jpg" class="active" alt="Sponsor 1">
        <img src="SH-Brudens klædeskab.jpg" alt="Sponsor 2">
        <img src="SH-Porsheden.jpg" alt="Sponsor 3">
      </div>

    </div>

  </div>

  <!-- HØJRE -->
  <div class="right-column">

    <div class="top-banner">
      Aktuelle aktiviteter - Læs mere på via QR koden
    </div>

    <div class="right-content">
      <iframe
        id="newsFrame"
        src="https://borgernyt.dk/infotavle-blandet/"
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms">
      </iframe>
    </div>

  </div>

</div>

<script>
  // Slideshow
  const slides = document.querySelectorAll(".slideshow img");
  let index = 0;

  setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
  }, 5000);

  // Lettere opdatering af iframe-indhold hvert 30. minut
  function refreshIframe(frameId, baseUrl){
    const frame = document.getElementById(frameId);
    const sep = baseUrl.includes("?") ? "&" : "?";
    frame.src = baseUrl + sep + "_ts=" + Date.now();
  }

  setInterval(() => {
    refreshIframe(
      "newsFrame",
      "https://borgernyt.dk/infotavle-blandet/"
    );

    refreshIframe(
      "calendarFrame",
      "https://calendar.google.com/calendar/embed?src=fd7eaf4e2aa69c3e984a83824983eb7655b38893a5d5c95d4145d28197a0402c%40group.calendar.google.com&mode=AGENDA&ctz=Europe%2FCopenhagen"
    );
  }, 1800000);

  // Blød hel-side opdatering hver 6. time for at hente ny GitHub-version
  setInterval(() => {
    const cleanUrl = window.location.origin + window.location.pathname + "?v=" + Date.now();
    window.location.replace(cleanUrl);
  }, 21600000);

  // Genindlæs billeder diskret, så ændrede sponsorbilleder kan slå igennem
  function refreshSlides(){
    document.querySelectorAll(".slideshow img").forEach(img => {
      const original = img.getAttribute("src").split("?")[0];
      img.setAttribute("src", original + "?v=" + Date.now());
    });
  }

  setInterval(refreshSlides, 1800000);
</script>

</body>
</html>
